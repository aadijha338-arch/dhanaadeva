services:
  - type: web
    name: dhanaadev-backend
    env: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dhanaadev-db
          property: connectionString

  - type: web
    name: dhanaadev-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        value: https://dhanaadev-backend.onrender.com

databases:
  - name: dhanaadev-db
    plan: free